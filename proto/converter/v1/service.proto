syntax = "proto3";

package converter.v1;

import "converter/v1/model.proto";

option go_package = "github.com/debalin/portify/gen/go/converter/v1;converterv1";

// ConverterService is the main entry point for the frontend.
service ConverterService {
  // ListProviders returns a list of supported source and destination providers.
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);

  // GetAuthURL generates an OAuth URL for the user to log in to a specific provider.
  rpc GetAuthURL(GetAuthURLRequest) returns (GetAuthURLResponse);

  // ExchangeAuthCode trades the callback code for an ephemeral Access Token.
  rpc ExchangeAuthCode(ExchangeAuthCodeRequest) returns (ExchangeAuthCodeResponse);

  // ListUserPlaylists fetches the user's existing playlists from the provider.
  rpc ListUserPlaylists(ListUserPlaylistsRequest) returns (ListUserPlaylistsResponse);

  // ConvertPlaylist triggers the conversion process.
  // Note: In a real app, this might return a job ID (async), but for now we'll do it sync-ish or stream the response.
  rpc ConvertPlaylist(ConvertPlaylistRequest) returns (ConvertPlaylistResponse);
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated ProviderInfo sources = 1;
  repeated ProviderInfo destinations = 2;
}

message ProviderInfo {
  string id = 1;   // e.g., "spotify", "youtube"
  string name = 2; // e.g., "Spotify", "YouTube Music"
  string auth_url_hint = 3; // optional helper to tell frontend where to redirect
}

message GetAuthURLRequest {
  string provider_id = 1; // e.g., "spotify" or "youtube"
}

message GetAuthURLResponse {
  string auth_url = 1;
}

message ExchangeAuthCodeRequest {
  string provider_id = 1; // e.g., "spotify" or "youtube"
  string code = 2;        // The OAuth code returned in the callback URL
}

message ExchangeAuthCodeResponse {
  bool success = 1;
  string access_token = 2; // Ephemeral token to be held by the frontend
  string error_message = 3;
}

message ListUserPlaylistsRequest {
  string provider_id = 1;
  string access_token = 2; // Token retrieved from ExchangeAuthCode
}

message ListUserPlaylistsResponse {
  repeated converter.v1.CanonicalPlaylist playlists = 1;
}

message ConvertPlaylistRequest {
  string source_provider = 1;      // e.g., "spotify"
  string destination_provider = 2; // e.g., "youtube"
  
  // The ID of the playlist on the source platform.
  string source_playlist_id = 3; 

  // Optional: If they picked an existing destination playlist, we just append to it
  string destination_playlist_id = 4;

  // The authorization tokens for the source and destination (if passed from frontend).
  string source_auth_token = 5;
  string destination_auth_token = 6;
}

message ConvertPlaylistResponse {
  bool success = 1;
  string message = 2;
  
  // Link to the newly created playlist.
  string destination_playlist_url = 3;
  
  // Summary of the conversion.
  int32 tracks_total = 4;
  int32 tracks_converted = 5;
  int32 tracks_failed = 6;
  
  // List of tracks that couldn't be found/converted.
  repeated CanonicalTrack failed_tracks = 7;
}
