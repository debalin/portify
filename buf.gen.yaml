version: v1
plugins:
  # Generate Go code for Protobufs
  - plugin: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  
  # Generate ConnectRPC code (Client + Server interfaces)
  - plugin: buf.build/connectrpc/go
    out: gen/go
    opt: paths=source_relative

  # Generate TypeScript models and clients for frontend
  - plugin: es
    out: frontend/src/gen
    opt: target=ts
  
  - plugin: connect-es
    out: frontend/src/gen
    opt: target=ts
