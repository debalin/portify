server {
    listen 80;
    server_name localhost;

    # Serve static files for the React app
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Re-route all 404s to index.html for React Router to handle
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API requests to the Go backend container
    # Our service prefix is /converter.v1.ConverterService/
    location /converter.v1.ConverterService/ {
        proxy_pass http://backend:8080/converter.v1.ConverterService/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy healthcheck
    location /health {
        proxy_pass http://backend:8080/health;
    }
}
