version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # Use .env file variables if present. We fallback to turning on Mock Mode
      # so the app starts even without valid API keys.
      - PORTIFY_MOCK_MODE=${PORTIFY_MOCK_MODE:-true}
      - SPOTIFY_ID=${SPOTIFY_ID:-}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-}
      - YOUTUBE_ID=${YOUTUBE_ID:-}
      - YOUTUBE_SECRET=${YOUTUBE_SECRET:-}

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
