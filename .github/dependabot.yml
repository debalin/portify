version: 2
updates:
  # Enable npm coverage mapping
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    
  # Enable mod coverage mapping
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    
  # Enable GH actions hygiene 
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
